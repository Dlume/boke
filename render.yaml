# Render.yaml - Render.com deployment configuration
services:
  - type: web
    name: begonia-illustrated
    env: python
    region: oregon  # Change to singapore for Asia proximity
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python webapp/app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8080
      - key: BEGONIA_DB
        value: /tmp/begonia.db  # Ephemeral for Render free tier
    healthCheckPath: /
    autoDeploy: true
