{% extends 'base.html' %}
{% block content %}
<h2>地图</h2>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const points = {{ points | tojson }};
  const map = L.map('map').setView([4.7, 96.8], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  points.forEach(p => {
    if (p.latitude && p.longitude) {
      L.marker([p.latitude, p.longitude]).addTo(map).bindPopup(`<a href="/species/${p.slug}">${p.scientific_name}</a>`)
    }
  });
</script>
{% endblock %}
