name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          # 如果项目有测试，运行它们
          # python -m unittest discover -s tests -p 'test_*.py'
          echo "No tests found, skipping."
          # 简单的语法检查
          python -m py_compile webapp/app.py

  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK secret is not set. Skipping deployment."
            exit 0
          fi
          echo "🚀 Triggering Render deployment..."
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
          if [ "$response" -eq 200 ]; then
            echo "✅ Render deployment triggered successfully!"
          else
            echo "❌ Failed to trigger Render deployment. HTTP Status: $response"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: |
          echo "🎉 Deployment pipeline completed successfully."

      - name: Notify failure
        if: failure()
        run: |
          echo "💥 Deployment pipeline failed. Please check the logs."
